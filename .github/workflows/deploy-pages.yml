name: Deploy Nuxt SPA to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'frontend-nuxt/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-nuxt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        
      - name: Setup GitHub Pages Environment
        id: pages
        uses: actions/configure-pages@v4
        
      - name: Generate static site
        run: bun run generate
        env:
          # Automatically detects the repository name for base URL
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}/
          # Uses Nitro's github-pages preset to handle 404.html for SPA routing
          NITRO_PRESET: github_pages
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-nuxt/.output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
